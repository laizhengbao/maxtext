# model config for llama3.2-11b-vision
# Published Llama 3.2 Vision / Mllama 11B text backbone + vision adapter layout.

base_emb_dim: 4096
base_num_query_heads: 32
base_num_kv_heads: 8
base_num_decoder_layers: 40
base_mlp_dim: 14336
head_dim: 128
mlp_activations: ["silu","linear"]
vocab_size: 128256
enable_dropout: False
logits_via_embedding: False
normalization_layer_epsilon: 1.0e-5
rope_max_timescale: 500_000
decoder_block: "mllama"
rope_type: "llama3.1"
tokenizer_type: "huggingface"
cross_attention_layers: [3, 8, 13, 18, 23, 28, 33, 38]

# Multimodal flags (need to set use_multimodal=true)
image_size_for_vit: 560
tile_size_for_vit: 560
max_num_tiles_for_vit: 4
num_channels_for_vit: 3
patch_size_for_vit: 14
hidden_size_for_vit: 1280
intermediate_size_for_vit: 5120
num_hidden_layers_for_vit: 32
num_global_layers_for_vit: 8
num_attention_heads_for_vit: 16
vision_output_dim_for_vit: 7680
image_placeholder: "<|image|>"
